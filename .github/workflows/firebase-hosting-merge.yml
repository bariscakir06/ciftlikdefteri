name: Deploy to Firebase Hosting on Merge

on:
  push:
    branches:
      - main

permissions:
  checks: write
  contents: read
  pull-requests: write

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set Up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Build Vite Project
        run: npm run build

      - name: Verify Firebase Hosting Build Output
        run: |
          test -f firebase.json
          test -d dist
          node -e "const config = require('./firebase.json'); if (config.hosting.public !== 'dist') { throw new Error('firebase.json hosting.public must be dist'); }"
          ls -la dist

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          projectId: ciftlikdefteri
          channelId: live
          entryPoint: .
